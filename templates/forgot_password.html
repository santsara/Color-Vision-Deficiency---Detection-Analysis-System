<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Color Vision Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .signup-hero { margin: 60px auto; width: 55%; max-width: 560px; padding: 40px; }

        .step-indicator { display: flex; justify-content: center; align-items: center; gap: 0; margin-bottom: 32px; }
        .step-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s; }
        .step-dot.active { background: linear-gradient(135deg, #ff512f, #dd2476); border-color: transparent; color: white; }
        .step-dot.done { background: rgba(79,172,254,0.3); border-color: #4facfe; color: #4facfe; }
        .step-line { flex: 1; height: 2px; background: rgba(255,255,255,0.12); max-width: 60px; }
        .step-line.done { background: #4facfe; }
        .step-labels { display: flex; justify-content: space-between; margin-bottom: 28px; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.5px; }
        .step-labels span.active { color: #ffc83c; font-weight: 600; }

        .form-group { display: flex; flex-direction: column; margin-bottom: 18px; text-align: left; }
        .form-group label { font-size: 13px; color: #ccc; margin-bottom: 6px; }
        .form-group input { padding: 13px 16px; border-radius: 14px; border: none; outline: none; background: rgba(255,255,255,0.92); color: #333; font-size: 15px; width: 100%; box-sizing: border-box; }
        
        .otp-row { display: flex; gap: 10px; align-items: flex-end; }
        .otp-row .form-group { flex: 1; margin-bottom: 0; }
        .otp-send-btn { padding: 13px 20px; font-size: 14px; white-space: nowrap; flex-shrink: 0; height: 48px; margin-bottom: 0; }
        .otp-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .error-msg { color: #ff512f; font-size: 13px; margin-bottom: 14px; }
        .success-msg { color: #4dd6a6; font-size: 13px; margin-bottom: 14px; }

        .strength-bar { height: 4px; border-radius: 4px; margin-top: 6px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 4px; width: 0; transition: width 0.3s, background 0.3s; }
        .strength-text { font-size: 11px; color: #aaa; margin-top: 3px; text-align: right; }
        .match-hint { font-size: 11px; margin-top: 4px; }
        .match-hint.ok  { color: #4dd6a6; }
        .match-hint.bad { color: #ff8a80; }

        .links { margin-top: 20px; }
        .links a { color: #4facfe; text-decoration: none; font-size: 14px; }
        .links a:hover { text-decoration: underline; }

        .step-panel { display: none; }
        .step-panel.active { display: block; }

        @media(max-width: 700px) { .signup-hero { width: 92%; padding: 24px 16px; } }
    </style>
</head>

<body>
    <nav class="main-nav">
        <div class="logo">Color Vision Detector</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Home</a>
            <button onclick="toggleBW()" class="mode-btn">Dark Mode</button>
        </div>
    </nav>

    <section class="hero signup-hero">
        <h1 style="font-size:38px;">Reset Password</h1>
        <p>Enter your registered email to receive a reset code.</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <div class="step-indicator">
            <div class="step-dot active" id="dot1">1</div>
            <div class="step-line" id="line1"></div>
            <div class="step-dot" id="dot2">2</div>
            <div class="step-line" id="line2"></div>
            <div class="step-dot" id="dot3">3</div>
        </div>
        <div class="step-labels">
            <span class="active" id="lbl1">Enter Email</span>
            <span id="lbl2">Verify OTP</span>
            <span id="lbl3">New Password</span>
        </div>

        <div class="step-panel active" id="step1">
            <div class="form-group">
                <label>Registered Email Address *</label>
                <input type="email" id="s1_email" placeholder="john@example.com" required>
            </div>
            <div id="step1Err" class="error-msg" style="display:none;"></div>
            <button onclick="goStep2()" style="margin-top:8px; width:100%;">Continue →</button>
        </div>

        <div class="step-panel" id="step2">
            <p style="color:#ccc; font-size:14px; margin-bottom:20px;">
                We'll send a 6-digit code to <strong id="emailDisplay" style="color:#ffc83c;"></strong>
            </p>
            <div class="otp-row">
                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text" id="s2_otp" placeholder="Enter 6-digit code" maxlength="6" inputmode="numeric">
                </div>
                <button class="otp-send-btn" id="sendOtpBtn" onclick="sendOTP()">Send Code</button>
            </div>
            <div id="otpTimer" style="font-size:12px; color:#888; margin-top:6px; text-align:right; display:none;"></div>
            <div id="step2Err" class="error-msg" style="display:none;"></div>
            <div id="step2Ok"  class="success-msg" style="display:none;"></div>
            <button onclick="verifyOTP()" style="margin-top:18px; width:100%;">Verify →</button>
            <p style="margin-top:14px; font-size:13px; color:#888;"><a href="#" onclick="goStep1(); return false;" style="color:#4facfe;">← Change email</a></p>
        </div>

        <div class="step-panel" id="step3">
            <form method="POST" action="{{ url_for('forgot_password') }}" id="resetForm">
                <input type="hidden" name="email" id="h_email">
                <input type="hidden" name="reset_token" id="h_token">

                <div class="form-group">
                    <label>New Password *</label>
                    <input type="password" id="s3_pw" name="password" placeholder="At least 8 characters" oninput="checkStrength(this.value)" required>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-text" id="strengthText"></div>
                </div>

                <div class="form-group">
                    <label>Confirm New Password *</label>
                    <input type="password" id="s3_pw2" name="password2" placeholder="Same as above" oninput="checkMatch()" required>
                    <div class="match-hint" id="matchHint"></div>
                </div>
                <div id="step3Err" class="error-msg" style="display:none;"></div>
                <button type="button" onclick="submitReset()" style="margin-top:8px; width:100%;">Reset Password</button>
            </form>
        </div>

        <div class="links"><a href="{{ url_for('login') }}">Back to Login</a></div>
    </section>

    <div class="bubbles"><span></span><span></span><span></span><span></span><span></span><span></span></div>

    <script>
    var currentStep = 1;
    function setStep(n) {
        for (var i = 1; i <= 3; i++) {
            document.getElementById("step" + i).classList.toggle("active", i === n);
            var dot = document.getElementById("dot" + i);
            dot.classList.remove("active", "done");
            if (i < n) dot.classList.add("done");
            else if (i === n) dot.classList.add("active");
            document.getElementById("lbl" + i).classList.toggle("active", i === n);
        }
        for (var j = 1; j <= 2; j++) document.getElementById("line" + j).classList.toggle("done", j < n);
        currentStep = n;
    }

    function goStep1() { setStep(1); }
    function goStep2() {
        var email = document.getElementById("s1_email").value.trim();
        var err = document.getElementById("step1Err");
        if (!email || !email.includes("@")) { showErr(err, "Please enter a valid email."); return; }
        err.style.display = "none";
        document.getElementById("emailDisplay").textContent = email;
        setStep(2);
    }

    var countdown = null;
    function sendOTP() {
        var email = document.getElementById("s1_email").value.trim();
        var btn = document.getElementById("sendOtpBtn");
        var err = document.getElementById("step2Err");
        var ok = document.getElementById("step2Ok");

        err.style.display = "none"; ok.style.display = "none";
        btn.disabled = true; btn.textContent = "Sending…";

        fetch("/send-reset-otp", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email })
        })
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                showOk(ok, "Code sent to " + email + ".");
                startCountdown(60);
            } else {
                showErr(err, data.error || "Failed to send code. Try again.");
                btn.disabled = false; btn.textContent = "Send Code";
            }
        })
        .catch(() => { showErr(err, "Network error."); btn.disabled = false; btn.textContent = "Send Code"; });
    }

    function startCountdown(secs) {
        var timerEl = document.getElementById("otpTimer");
        var btn = document.getElementById("sendOtpBtn");
        timerEl.style.display = "block";
        if (countdown) clearInterval(countdown);
        var remaining = secs;
        timerEl.textContent = "Resend in " + remaining + "s";
        countdown = setInterval(function() {
            remaining--;
            if (remaining <= 0) {
                clearInterval(countdown);
                timerEl.style.display = "none";
                btn.disabled = false; btn.textContent = "Resend Code";
            } else { timerEl.textContent = "Resend in " + remaining + "s"; }
        }, 1000);
    }

    function verifyOTP() {
        var email = document.getElementById("s1_email").value.trim();
        var code = document.getElementById("s2_otp").value.trim();
        var err = document.getElementById("step2Err");

        if (!code || code.length !== 6) { showErr(err, "Enter 6-digit code."); return; }
        err.style.display = "none";

        fetch("/verify-reset-otp", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, otp: code })
        })
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                if (countdown) clearInterval(countdown);
                document.getElementById("h_email").value = email;
                document.getElementById("h_token").value = data.token;
                setStep(3);
            } else { showErr(err, data.error || "Incorrect code."); }
        })
        .catch(() => { showErr(err, "Network error."); });
    }

    function checkStrength(pw) {
        var fill = document.getElementById("strengthFill");
        var txt = document.getElementById("strengthText");
        var score = 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;

        var widths = ["0%","25%","50%","75%","100%"];
        var colors = ["","#ff512f","#ffc83c","#4facfe","#4dd6a6"];
        var labels = ["","Weak","Fair","Good","Strong"];

        fill.style.width = widths[score];
        fill.style.background = colors[score];
        txt.textContent = score > 0 ? labels[score] : "";
        txt.style.color = colors[score];
        checkMatch();
    }

    function checkMatch() {
        var pw = document.getElementById("s3_pw").value;
        var pw2 = document.getElementById("s3_pw2").value;
        var hint = document.getElementById("matchHint");
        if (!pw2) { hint.textContent = ""; return; }
        if (pw === pw2) { hint.textContent = "✓ Passwords match"; hint.className = "match-hint ok"; }
        else { hint.textContent = "✗ Passwords do not match"; hint.className = "match-hint bad"; }
    }

    function submitReset() {
        var pw = document.getElementById("s3_pw").value;
        var pw2 = document.getElementById("s3_pw2").value;
        var err = document.getElementById("step3Err");
        if (pw.length < 8) { showErr(err, "Password must be at least 8 characters."); return; }
        if (pw !== pw2) { showErr(err, "Passwords do not match."); return; }
        document.getElementById("resetForm").submit();
    }

    function showErr(el, msg) { el.textContent = msg; el.style.display = "block"; }
    function showOk(el, msg) { el.textContent = msg; el.style.display = "block"; }

    function toggleBW() {
        document.body.classList.toggle("bw-mode");
        localStorage.setItem("mode", document.body.classList.contains("bw-mode") ? "bw" : "color");
    }
    if (localStorage.getItem("mode") === "bw") document.body.classList.add("bw-mode");
    </script>
</body>
</html>
